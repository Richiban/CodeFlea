name: Build and Publish Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get current version
      id: current_version
      run: |
        CURRENT_VERSION=$(node -p "require('./package.json').version")
        echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        echo "Current version: $CURRENT_VERSION"

    - name: Check if version tag exists
      id: check_tag
      run: |
        if git rev-parse "v${{ steps.current_version.outputs.version }}" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Tag v${{ steps.current_version.outputs.version }} already exists"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Tag v${{ steps.current_version.outputs.version }} does not exist"
        fi

    - name: Increment version
      id: increment_version
      if: steps.check_tag.outputs.exists == 'true'
      run: |
        npm version patch --no-git-tag-version
        NEW_VERSION=$(node -p "require('./package.json').version")
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "Incremented version to: $NEW_VERSION"

    - name: Set publish version
      id: publish_version
      run: |
        if [ "${{ steps.check_tag.outputs.exists }}" == "true" ]; then
          PUBLISH_VERSION=${{ steps.increment_version.outputs.version }}
        else
          PUBLISH_VERSION=${{ steps.current_version.outputs.version }}
        fi
        echo "version=$PUBLISH_VERSION" >> $GITHUB_OUTPUT
        echo "Publishing version: $PUBLISH_VERSION"

    - name: Compile TypeScript
      run: npm run compile

    - name: Install VSCE
      run: npm install -g @vscode/vsce

    - name: Package extension
      run: vsce package

    - name: Publish to marketplace
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: vsce publish -p $VSCE_PAT

    - name: Commit version bump
      if: steps.check_tag.outputs.exists == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add package.json
        git commit -m "Bump version to ${{ steps.publish_version.outputs.version }} [skip ci]"
        git push

    - name: Create Git tag
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git tag "v${{ steps.publish_version.outputs.version }}"
        git push origin "v${{ steps.publish_version.outputs.version }}"

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.publish_version.outputs.version }}
        release_name: Release v${{ steps.publish_version.outputs.version }}
        body: |
          Automated release of CodeFlea extension v${{ steps.publish_version.outputs.version }}
          
          This release was automatically generated by the GitHub Actions workflow.
        draft: false
        prerelease: false

    - name: Upload VSIX to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./codeflea-${{ steps.publish_version.outputs.version }}.vsix
        asset_name: codeflea-${{ steps.publish_version.outputs.version }}.vsix
        asset_content_type: application/zip